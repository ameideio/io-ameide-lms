name: CD / Image Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or commit) to publish from"
        required: false
        default: ""
  push:
    branches:
      - develop
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/ameideio/io-ameide-lms
  FRAPPE_BRANCH: version-15
  APP_REPOSITORY: https://github.com/ameideio/io-ameide-lms

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Encode apps.json
        id: source
        shell: bash
        env:
          SOURCE_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail
          source_ref="${SOURCE_REF#refs/heads/}"
          source_ref="${source_ref#refs/tags/}"
          source_sha="$(git rev-parse HEAD)"
          apps_json_path="${RUNNER_TEMP}/apps.json"
          echo "Publishing app payload from ref ${source_ref} at commit ${source_sha}"
          apps_json='[{"url":"https://github.com/frappe/payments","branch":"version-15"},{"url":"'"${APP_REPOSITORY}"'","branch":"'"${source_ref}"'","cache_key":"'"${source_sha}"'"}]'
          printf '%s' "${apps_json}" > "${apps_json_path}"
          apps_json_sha="$(shasum -a 256 "${apps_json_path}" | awk '{print $1}')"
          echo "app_ref=${source_ref}" >> "${GITHUB_OUTPUT}"
          echo "apps_json_path=${apps_json_path}" >> "${GITHUB_OUTPUT}"
          echo "apps_json_sha=${apps_json_sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: builds
          fetch-depth: 0

      - name: Patch frappe_docker app cache bust
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path("builds/images/layered/Containerfile")
          text = path.read_text()
          pattern = re.compile(
              r"USER frappe\\s*\\n\\s*RUN --mount=type=secret,id=apps_json,target=/opt/frappe/apps\\.json,uid=1000,gid=1000 \\\\\\n"
          )
          replacement = (
              "USER frappe\\n\\n"
              "ARG APPS_CACHEBUST\\n\\n"
              "RUN --mount=type=secret,id=apps_json,target=/opt/frappe/apps.json,uid=1000,gid=1000 \\\\\\n"
              "  test -n \\\"$APPS_CACHEBUST\\\" && \\\\\\n"
          )
          if "ARG APPS_CACHEBUST" not in text:
              text, count = pattern.subn(replacement, text, count=1)
              if count != 1:
                  raise SystemExit("Unable to locate apps_json build layer in Containerfile")
              path.write_text(text)
          PY

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=develop,enable=${{ steps.source.outputs.app_ref == 'develop' }}
            type=raw,value=develop-{{sha}},enable=${{ steps.source.outputs.app_ref == 'develop' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          context: builds
          file: builds/images/layered/Containerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            apps_json=${{ steps.source.outputs.apps_json_path }}
          build-args: |
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
            APPS_CACHEBUST=${{ steps.source.outputs.apps_json_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
