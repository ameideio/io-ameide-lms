name: CD / Image Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or commit) to publish from"
        required: false
        default: ""
  push:
    branches:
      - develop
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/ameideio/io-ameide-lms
  FRAPPE_BRANCH: version-15
  APP_REPOSITORY: https://github.com/ameideio/io-ameide-lms

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Encode apps.json
        id: source
        shell: bash
        env:
          SOURCE_REF: ${{ github.event.inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail
          source_ref="${SOURCE_REF#refs/heads/}"
          source_ref="${source_ref#refs/tags/}"
          source_sha="$(git rev-parse HEAD)"
          apps_json_path="${RUNNER_TEMP}/apps.json"
          echo "Publishing app payload from ref ${source_ref} at commit ${source_sha}"
          apps_json='[{"url":"https://github.com/frappe/payments","branch":"version-15"},{"url":"'"${APP_REPOSITORY}"'","branch":"'"${source_ref}"'","cache_key":"'"${source_sha}"'"}]'
          printf '%s' "${apps_json}" > "${apps_json_path}"
          echo "app_ref=${source_ref}" >> "${GITHUB_OUTPUT}"
          echo "apps_json_path=${apps_json_path}" >> "${GITHUB_OUTPUT}"

      - name: Checkout frappe_docker
        uses: actions/checkout@v6.0.2
        with:
          repository: frappe/frappe_docker
          path: builds
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=develop,enable=${{ steps.source.outputs.app_ref == 'develop' }}
            type=raw,value=develop-{{sha}},enable=${{ steps.source.outputs.app_ref == 'develop' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          push: true
          context: builds
          file: builds/images/layered/Containerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            apps_json=${{ steps.source.outputs.apps_json_path }}
          build-args: |
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
          no-cache-filters: |
            builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign published image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
