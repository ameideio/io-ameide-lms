name: CD / Image Publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or commit) to publish from"
        required: false
        default: ""
  push:
    branches:
      - develop
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/ameideio/io-ameide-lms
  FRAPPE_BRANCH: version-15
  APP_REPOSITORY: https://github.com/ameideio/io-ameide-lms

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Encode apps.json
        shell: bash
        env:
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          source_ref="${SOURCE_REF#refs/heads/}"
          source_ref="${source_ref#refs/tags/}"
          source_sha="$(git rev-parse HEAD)"
          echo "Publishing app payload from ref ${source_ref} at commit ${source_sha}"
          apps_json='[{"url":"https://github.com/frappe/payments","branch":"version-15"},{"url":"'"${APP_REPOSITORY}"'","branch":"'"${source_ref}"'","cache_key":"'"${source_sha}"'"}]'
          echo "APPS_JSON_BASE64=$(echo "${apps_json}" | base64 -w 0)" >> "${GITHUB_ENV}"

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: builds
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=main-{{sha}},enable=${{ github.ref == 'refs/heads/develop' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          context: builds
          file: builds/images/layered/Containerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FRAPPE_BRANCH=${{ env.FRAPPE_BRANCH }}
            APPS_JSON_BASE64=${{ env.APPS_JSON_BASE64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Inspect published image
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
